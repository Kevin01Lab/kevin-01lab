baseURL = 'https://example.org/'
languageCode = 'fr'
title = 'Kevin @ 0.1Lab'
theme = 'PaperMod'

[pagination]
    pagerSize = 4

# Ensure JSON is output for the search functionality
[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
    env = "production"
    defaultTheme = "auto"
    
    # UI Toggles from Joel's config
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowWordCount = true
    ShowRssButtonInSectionTermList = false
    UseHugoToc = true

    # The secret to Joel's layout: homeInfoParams instead of profileMode
    [params.homeInfoParams]
        Title = "Bonjour 👋"
        Content = "Je publie sur le GEO, la visibilité dans les moteurs IA et la façon dont les marques B2B deviennent plus compréhensibles, plus crédibles et plus souvent citées."

    [params.cover]
        hidden = true # hide everywhere but not in structured data
        hiddenInList = true # hide on list pages and home
        hiddenInSingle = false # hide on single page

    # Share buttons at the bottom of posts - keeping only LinkedIn
    ShareButtons = ["linkedin"]

    # Social icons on the home page (Home Info Mode)
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/company/0-1lab"
        title = "mon linkedin"
    [[params.socialIcons]]
        name = "website"
        url = "https://0.1lab.fr"
        title = "mon site web"
    [[params.socialIcons]]
        name = "medium"
        url = "https://medium.com/@0.1Lab"
        title = "mon medium"

    [params.fuseOpts]
        isCaseSensitive = false
        shouldSort = true
        location = 0
        distance = 1000
        threshold = 0.4
        minMatchCharLength = 0
        keys = ["title", "permalink", "summary", "content"]

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "Articles"
        url = "/posts/"
        weight = 20
    [[menu.main]]
        identifier = "search"
        name = "Recherche"
        url = "/recherche/"
        weight = 30
    [[menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 40
    [[menu.main]]
        identifier = "about"
        name = "À propos"
        url = "/a-propos/"
        weight = 50

[markup]
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "srcery"
